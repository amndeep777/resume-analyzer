# ================================
# App Info
# ================================
spring.application.name=resume-analyzer

# ================================
# Active Profile (dev uses H2, prod uses PostgreSQL)
# ================================
spring.profiles.active=dev

# ================================
# File Upload
# ================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================================
# JWT Config
# ================================
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# ================================
# Gemini AI Config (set your key in env or override in application-prod.properties)
# ================================
app.gemini.api-key=${GEMINI_API_KEY:your-gemini-api-key-here}
app.gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# ================================
# CORS
# ================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
